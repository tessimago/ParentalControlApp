{% extends "base.html" %}
{% block title_suffix %} - {{ t.live }}{% endblock %}

{% block content %}
<h1>{{ t.live_screen }}</h1>

<div class="card live-card">
    <img src="{{ url_for('main.live_stream') }}" class="live-stream" alt="Live screen feed">
    <p class="note">{{ t.streaming_note }}</p>
</div>
{% endblock %}
